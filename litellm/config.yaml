# 2026GPT - LiteLLM Proxy Configuration
# Complexity-based model router: cheap models for simple tasks, powerful for complex
# Docs: https://docs.litellm.ai/docs/proxy/auto_routing

model_list:
  # ──────────────────────────────────────────────────────────────
  # "auto" - complexity-routed virtual model
  # Uses the built-in complexity router to score each prompt and
  # pick the cheapest model that can handle it.
  # ──────────────────────────────────────────────────────────────
  - model_name: "auto"
    litellm_params:
      model: "auto_router/complexity_router"
      api_key: "os.environ/OPENAI_API_KEY"
      complexity_router_config:
        tiers:
          SIMPLE: "gpt-5.4-nano"
          MEDIUM: "gpt-5.4-mini"
          COMPLEX: "gpt-5.4"
          REASONING: "gpt-5.4"
      complexity_router_default_model: "gpt-5.4-nano"

  # ──────────────────────────────────────────────────────────────
  # Direct-access models (no routing, pass-through)
  # Users who explicitly pick a model get exactly that model.
  # ──────────────────────────────────────────────────────────────
  - model_name: "gpt-5.4-nano"
    litellm_params:
      model: openai/gpt-5.4-nano
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "gpt-5.4-mini"
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: "os.environ/OPENAI_API_KEY"

  - model_name: "gpt-5.4"
    litellm_params:
      model: openai/gpt-5.4
      api_key: "os.environ/OPENAI_API_KEY"

litellm_settings:
  drop_params: true

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  database_url: "os.environ/DATABASE_URL"
