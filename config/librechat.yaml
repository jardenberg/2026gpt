# 2026GPT - LibreChat Configuration
# Documentation: https://www.librechat.ai/docs/configuration/librechat_yaml
# Model list verified against live OpenAI API, March 28, 2026

version: 1.2.1
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

endpoints:
  # ──────────────────────────────────────────────────────────────
  # OpenAI Direct API
  # ──────────────────────────────────────────────────────────────
  openAI:
    enabled: true
    titleConvo: true
    titleModel: "gpt-5.4-nano"
    modelDisplayLabel: "OpenAI"
    models:
      default:
        - "gpt-5.4-nano"
        - "gpt-5.4-mini"
        - "gpt-5.4"
        - "gpt-5.4-pro"
        - "gpt-5.3-codex"
        - "gpt-4.1-mini"
        - "gpt-4.1-nano"
      fetch: true

  # Azure OpenAI - uncomment this entire block once Azure is provisioned
  # and AZURE_OPENAI_API_KEY is set in .env
  # azureOpenAI:
  #   enabled: true
  #   titleConvo: true
  #   titleModel: "gpt-5-mini"
  #   groups:
  #     - group: "2026gpt-openai"
  #       apiKey: "${AZURE_OPENAI_API_KEY}"
  #       instanceName: "2026gpt-openai"
  #       version: "2025-04-01-preview"
  #       models:
  #         gpt-5-mini:
  #           deploymentName: "gpt-5-mini"
  #         gpt-5-nano:
  #           deploymentName: "gpt-5-nano"

  google:
    disabled: true
  anthropic:
    disabled: true
  assistants:
    disabled: true

fileConfig:
  endpoints:
    openAI:
      fileLimit: 10
      fileSizeLimit: 25
    default:
      totalSizeLimit: 100

rateLimits:
  fileUploads:
    ipMax: 50
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60

registration:
  socialLogins:
    - google
    - github
  allowedDomains: []

# ──────────────────────────────────────────────────────────────
# Model Specs - controls which model is pre-selected for new chats
# ──────────────────────────────────────────────────────────────
modelSpecs:
  enforce: false
  prioritize: true
  list:
    - name: "gpt-5.4-nano"
      label: "GPT-5.4 Nano"
      description: "Fastest and cheapest. Great for quick tasks."
      default: true
      preset:
        endpoint: "openAI"
        model: "gpt-5.4-nano"
    - name: "gpt-5.4-mini"
      label: "GPT-5.4 Mini"
      description: "More capable, still affordable."
      preset:
        endpoint: "openAI"
        model: "gpt-5.4-mini"
    - name: "gpt-5.4"
      label: "GPT-5.4"
      description: "Flagship model. Best for complex tasks."
      preset:
        endpoint: "openAI"
        model: "gpt-5.4"
    - name: "gpt-5.4-pro"
      label: "GPT-5.4 Pro"
      description: "Maximum capability."
      preset:
        endpoint: "openAI"
        model: "gpt-5.4-pro"
    - name: "gpt-5.3-codex"
      label: "GPT-5.3 Codex"
      description: "Coding specialist."
      preset:
        endpoint: "openAI"
        model: "gpt-5.3-codex"
