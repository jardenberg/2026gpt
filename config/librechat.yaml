# 2026GPT - LibreChat Configuration
# Documentation: https://www.librechat.ai/docs/configuration/librechat_yaml
# Model list verified against live OpenAI API, March 28, 2026
# OpenAI traffic routed via LiteLLM proxy for cost-optimized "Auto" routing

version: 1.3.6
cache: true

# ──────────────────────────────────────────────────────────────
# Branding — Big Truck Co / 2026GPT
# Welcome message is set via APP_TITLE env var + interface.welcome (see docs)
# ──────────────────────────────────────────────────────────────

interface:
  endpointsMenu: true        # Keep: needed for Agents endpoint access
  modelSelect: true           # Keep: users pick their model
  parameters: false           # Hide: temperature, top_p etc. (advanced)
  sidePanel: true             # Keep: memory, file uploads, agent config
  presets: false              # Hide: confusing for new users
  prompts: false              # Hide: prompt library (advanced)
  bookmarks: false            # Hide: not needed yet
  multiConvo: false           # Hide: multi-conversation view (advanced)

endpoints:
  # ──────────────────────────────────────────────────────────────
  # LiteLLM Proxy (custom endpoint) - handles all user-facing traffic
  # Routes "auto" via complexity router, passes explicit models through
  # ──────────────────────────────────────────────────────────────
  custom:
    - name: "2026GPT"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "${LITELLM_BASE_URL}"
      models:
        default: ["auto", "gpt-5.4-nano", "gpt-5.4-mini", "gpt-5.4"]
        fetch: false
      titleConvo: true
      titleModel: "auto"
      modelDisplayLabel: "2026GPT"

  # ──────────────────────────────────────────────────────────────
  # OpenAI Direct - kept for memory agent and background tasks
  # Not exposed in model specs
  # ──────────────────────────────────────────────────────────────
  openAI:
    enabled: true
    titleConvo: true
    titleModel: "gpt-5.4-nano"
    models:
      default:
        - "gpt-5.4-nano"
      fetch: false

  # ──────────────────────────────────────────────────────────────
  # User-provided endpoints (advanced users can add their own keys)
  # ──────────────────────────────────────────────────────────────
  google:
    userProvide: true
  anthropic:
    userProvide: true

  # Azure OpenAI - uncomment once Azure is provisioned
  # azureOpenAI:
  #   enabled: true
  #   titleConvo: true
  #   titleModel: "gpt-5-mini"
  #   groups:
  #     - group: "2026gpt-openai"
  #       apiKey: "${AZURE_OPENAI_API_KEY}"
  #       instanceName: "2026gpt-openai"
  #       version: "2025-04-01-preview"
  #       models:
  #         gpt-5-mini:
  #           deploymentName: "gpt-5-mini"
  #         gpt-5-nano:
  #           deploymentName: "gpt-5-nano"

  # ──────────────────────────────────────────────────────────────
  # Agents - code execution via thehapyone/code-interpreter
  # https://github.com/thehapyone/code-interpreter
  # ──────────────────────────────────────────────────────────────
  agents:
    recursionLimit: 50
    maxRecursionLimit: 100
    disableBuilder: false
    # Capabilities available to all users. Remove items to disable.
    capabilities: ["execute_code", "file_search", "actions", "tools", "web_search"]

  assistants:
    disabled: true

fileConfig:
  endpoints:
    openAI:
      fileLimit: 10
      fileSizeLimit: 25
    default:
      totalSizeLimit: 100

rateLimits:
  fileUploads:
    ipMax: 50
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60

registration:
  socialLogins:
    - google
    - github
  allowedDomains: []

# ──────────────────────────────────────────────────────────────
# Web Search - Serper (search), Firecrawl (scraping), Jina (reranking)
# API keys set as Railway env vars (paid accounts, configured 2026-03-28)
# ──────────────────────────────────────────────────────────────
webSearch:
  searchProvider: 'serper'
  scraperProvider: 'firecrawl'
  rerankerType: 'jina'
  serperApiKey: '${SERPER_API_KEY}'
  firecrawlApiKey: '${FIRECRAWL_API_KEY}'
  firecrawlApiUrl: 'https://api.firecrawl.dev'
  firecrawlVersion: 'v1'
  jinaApiKey: '${JINA_API_KEY}'
  jinaApiUrl: 'https://api.jina.ai/v1/rerank'

# ──────────────────────────────────────────────────────────────
# Memory - persistent cross-conversation context per user
# Uses a background agent to extract and store key facts
# ──────────────────────────────────────────────────────────────
memory:
  disabled: false
  personalize: true
  tokenLimit: 3000
  messageWindowSize: 5
  agent:
    provider: "openAI"
    model: "gpt-5.4-nano"

# ──────────────────────────────────────────────────────────────
# Model Specs - controls which model is pre-selected for new chats
# ──────────────────────────────────────────────────────────────
modelSpecs:
  enforce: false
  prioritize: true
  addedEndpoints:
    - "agents"
  list:
    - name: "auto"
      label: "Auto"
      description: "Picks the best model for the task. Cost-optimized."
      webSearch: true
      default: true
      preset:
        endpoint: "2026GPT"
        model: "auto"
        promptPrefix: "You are 2026GPT, the AI assistant for Big Truck Co. You help employees in heavy industry with clear, practical answers. Your users work in logistics, transport, manufacturing, and engineering.\n\nGuidelines:\n- Be direct and solution-oriented.\n- Default to concise answers. Go deeper when asked.\n- Assume domain knowledge. Don't over-explain basics.\n- Offer to work with uploaded files (documents, spreadsheets, data).\n- Use search tools when you need current information.\n- Say when you're uncertain rather than guessing.\n\nTone: Professional but approachable. Scandinavian directness, no corporate fluff."
    - name: "gpt-5.4-nano"
      label: "GPT-5.4 Nano"
      description: "Fastest and cheapest. Great for quick tasks."
      webSearch: true
      preset:
        endpoint: "2026GPT"
        model: "gpt-5.4-nano"
        promptPrefix: "You are 2026GPT, the AI assistant for Big Truck Co. You help employees in heavy industry with clear, practical answers. Your users work in logistics, transport, manufacturing, and engineering.\n\nGuidelines:\n- Be direct and solution-oriented.\n- Default to concise answers. Go deeper when asked.\n- Assume domain knowledge. Don't over-explain basics.\n- Offer to work with uploaded files (documents, spreadsheets, data).\n- Use search tools when you need current information.\n- Say when you're uncertain rather than guessing.\n\nTone: Professional but approachable. Scandinavian directness, no corporate fluff."
    - name: "gpt-5.4-mini"
      label: "GPT-5.4 Mini"
      description: "More capable, still affordable."
      webSearch: true
      preset:
        endpoint: "2026GPT"
        model: "gpt-5.4-mini"
        promptPrefix: "You are 2026GPT, the AI assistant for Big Truck Co. You help employees in heavy industry with clear, practical answers. Your users work in logistics, transport, manufacturing, and engineering.\n\nGuidelines:\n- Be direct and solution-oriented.\n- Default to concise answers. Go deeper when asked.\n- Assume domain knowledge. Don't over-explain basics.\n- Offer to work with uploaded files (documents, spreadsheets, data).\n- Use search tools when you need current information.\n- Say when you're uncertain rather than guessing.\n\nTone: Professional but approachable. Scandinavian directness, no corporate fluff."
    - name: "gpt-5.4"
      label: "GPT-5.4"
      description: "Flagship model. Best for complex tasks."
      webSearch: true
      preset:
        endpoint: "2026GPT"
        model: "gpt-5.4"
        promptPrefix: "You are 2026GPT, the AI assistant for Big Truck Co. You help employees in heavy industry with clear, practical answers. Your users work in logistics, transport, manufacturing, and engineering.\n\nGuidelines:\n- Be direct and solution-oriented.\n- Default to concise answers. Go deeper when asked.\n- Assume domain knowledge. Don't over-explain basics.\n- Offer to work with uploaded files (documents, spreadsheets, data).\n- Use search tools when you need current information.\n- Say when you're uncertain rather than guessing.\n\nTone: Professional but approachable. Scandinavian directness, no corporate fluff."
