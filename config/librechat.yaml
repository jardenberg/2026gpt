# 2026GPT - LibreChat Configuration
# Documentation: https://www.librechat.ai/docs/configuration/librechat_yaml
# Model list verified against live OpenAI API, March 28, 2026

version: 1.2.1
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

endpoints:
  # ──────────────────────────────────────────────────────────────
  # OpenAI Direct API
  # ──────────────────────────────────────────────────────────────
  openAI:
    enabled: true
    titleConvo: true
    titleModel: "gpt-5.4-nano"
    modelDisplayLabel: "OpenAI"
    models:
      default:
        - "gpt-5.4-nano"
        - "gpt-5.4-mini"
        - "gpt-5.4"
        - "gpt-5.4-pro"
        - "gpt-5.3-codex"
        - "gpt-4.1-mini"
        - "gpt-4.1-nano"
      fetch: true

  # Azure OpenAI - uncomment this entire block once Azure is provisioned
  # and AZURE_OPENAI_API_KEY is set in .env
  # azureOpenAI:
  #   enabled: true
  #   titleConvo: true
  #   titleModel: "gpt-5-mini"
  #   groups:
  #     - group: "2026gpt-openai"
  #       apiKey: "${AZURE_OPENAI_API_KEY}"
  #       instanceName: "2026gpt-openai"
  #       version: "2025-04-01-preview"
  #       models:
  #         gpt-5-mini:
  #           deploymentName: "gpt-5-mini"
  #         gpt-5-nano:
  #           deploymentName: "gpt-5-nano"

  google:
    disabled: true
  anthropic:
    disabled: true
  assistants:
    disabled: true

fileConfig:
  endpoints:
    openAI:
      fileLimit: 10
      fileSizeLimit: 25
    default:
      totalSizeLimit: 100

rateLimits:
  fileUploads:
    ipMax: 50
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60

registration:
  socialLogins: []
  allowedDomains: []
