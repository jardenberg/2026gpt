# 2026GPT - LibreChat Configuration
# This file configures AI endpoints, features, and UI customization
# Documentation: https://www.librechat.ai/docs/configuration/librechat_yaml

version: 1.2.1

cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true

endpoints:
  # ──────────────────────────────────────────────────────────────
  # OpenAI Direct API (Day 1 - no approval needed, just an API key)
  # ──────────────────────────────────────────────────────────────
  openAI:
    enabled: true
    titleConvo: true
    titleModel: "gpt-4.1-mini"
    modelDisplayLabel: "OpenAI"
    models:
      default:
        - "gpt-4.1-mini"      # Primary: strong all-rounder, cheap
        - "gpt-4.1-nano"      # Fast/lightweight, cheapest option
        - "gpt-4.1"           # Full power when needed
      fetch: true              # Also fetch available models from API

  # ──────────────────────────────────────────────────────────────
  # Azure OpenAI (Day 2+ - after Azure subscription is provisioned)
  # GPT-5-mini and GPT-5-nano don't require separate registration
  # ──────────────────────────────────────────────────────────────
  azureOpenAI:
    enabled: false  # Flip to true once Azure is set up
    titleConvo: true
    titleModel: "gpt-5-mini"

    groups:
      - group: "2026gpt-openai"
        apiKey: "${AZURE_OPENAI_API_KEY}"
        instanceName: "2026gpt-openai"  # Your Azure OpenAI resource name
        version: "2025-04-01-preview"   # Current Azure API version

        models:
          gpt-5-mini:
            deploymentName: "gpt-5-mini"
          gpt-5-nano:
            deploymentName: "gpt-5-nano"
          # GPT-5 full requires registration - uncomment after approval:
          # gpt-5:
          #   deploymentName: "gpt-5"

  # Disable providers we're not using yet (can enable any time)
  google:
    disabled: true
  anthropic:
    disabled: true
  assistants:
    disabled: true

# File upload configuration
fileConfig:
  endpoints:
    openAI:
      fileLimit: 10
      fileSizeLimit: 25  # MB
    azureOpenAI:
      fileLimit: 10
      fileSizeLimit: 25  # MB
    default:
      totalSizeLimit: 100

# Rate limiting (generous for demo)
rateLimits:
  fileUploads:
    ipMax: 50
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 20
    ipWindowInMinutes: 60
    userMax: 10
    userWindowInMinutes: 60

# Registration settings
registration:
  socialLogins: []
  allowedDomains: []
