      content="2026GPT is an enterprise AI workspace for research, document analysis, agents, code execution, and transparent product development."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="2026GPT" />
    <meta property="og:title" content="2026GPT" />
    <meta
      property="og:description"
      content="Enterprise AI for Big Truck Co. Live product, public roadmap, transparent metrics."
    />
    <meta property="og:url" content="https://2026gpt.jardenberg.se/" />
    <meta property="og:image" content="https://2026gpt.jardenberg.se/assets/og-image-2026gpt.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="2026GPT social preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="2026GPT" />
    <meta
      name="twitter:description"
      content="Enterprise AI for Big Truck Co. Live product, public roadmap, transparent metrics."
    />
    <meta
      name="twitter:image"
      content="https://2026gpt.jardenberg.se/assets/og-image-2026gpt.png"
    />
    <title>2026GPT</title>
    <link rel="icon" href="assets/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-180x180.png" />
    <link rel="canonical" href="https://2026gpt.jardenberg.se/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
    </style>
    <script>
      const theme = localStorage.getItem('color-theme');
      const loadingContainerStyle = document.createElement('style');
      let backgroundColor;

      if (theme === 'dark') {
        backgroundColor = '#0d0d0d';
      } else if (theme === 'light') {
        backgroundColor = '#ffffff';
      } else if (theme === 'system') {
        const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
        backgroundColor = prefersDarkScheme ? '#0d0d0d' : '#ffffff';
      } else {
        backgroundColor = '#ffffff';
      }

      loadingContainerStyle.innerHTML = `
        #loading-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: ${backgroundColor};
        }
      `;
      document.head.appendChild(loadingContainerStyle);
    </script>
    <script defer type="module" src="/src/main.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div id="loading-container"></div>
    </div>
  </body>
</html>
